name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer needs full history/tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static assets (esbuild minify)
        run: |
          npm ci
          npm run build

      - name: Restore
        run: dotnet restore OpenDataTables.sln

      - name: Build
        run: dotnet build OpenDataTables.sln -c Release --no-restore

      - name: Test (unit)
        run: dotnet test tests/OpenDataTables.Tests/OpenDataTables.Tests.csproj -c Release --no-build --verbosity normal

      # Phase B/D add the esbuild minify step; Phase E adds the Playwright E2E job.
